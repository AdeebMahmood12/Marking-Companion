<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            @font-face {
                font-family: Coolvetica;
                src: url('/static/coolvetica.otf') format('opentype');
            }
            @font-face {
                font-family: Lemon Milk;
                src: url('/static/lemon milk.otf') format('opentype');
            }  

            *{
                margin: 0%;
                scroll-behavior: smooth;
            }
            body{
                background-color: #FFC3C3;
                padding: 10vh;
            }

            .container{
                display: grid;
                grid-template-areas: 
                "ao4    improve     pie"
                "ao5    improve     etx";
                gap: 10px;
                justify-content: center;
                align-items: center;
                justify-items: center;
            }


            #ao4{
                grid-area: ao4;
            }
            #ao5{
                grid-area: ao5;
            }
            .all{
                grid-area: improve;
            }

            .info{
                border-radius: 49px;
                width: 250px;
                height: 200px;
                padding: 5%;
                box-sizing: border-box;
                background-color: #721212;
                font-family: Lemon Milk;
                color: white;
                transition: box-shadow 200ms ease-in-out;
            }
            .all{
                border-radius: 49px;
                width: 400px;
                height: 410px;
                padding: 5%;
                box-sizing: border-box;
                background-color: #721212;
                font-family: Lemon Milk;
                color: white;
                transition: box-shadow 200ms ease-in-out;
            }
            .all:hover{
                box-shadow: 4px 4px 30px rgba(0, 0, 0, 0.457);
            }
            .info:hover{
                box-shadow: 4px 4px 30px rgba(0, 0, 0, 0.457);
            }
            .words{
                font-family: Lemon Milk;
                text-align: center;
                font-size: 15pt;
            }
            .etx{
                margin-top: 2%;
                display: flex;
                justify-content: center;
                flex-direction: column;
                align-items: center;
                grid-area: etx;
            }
            .suggestion{
                margin-left: 4%;
                font-size: 8pt;
            }
            .ao{
                margin-left: 4%;
                font-size: 7pt;
            }         
            .piechart {
                grid-area: pie;
                width: 200px;
                height: 200px;
                border-radius: 50%;
                background-image: conic-gradient(
                    {{color}} {{degree}}deg,
                    #721212 0 {{remains}}deg
                );
                z-index: 0;
                transition: box-shadow 200ms ease-in-out;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .piechart{
                position: relative;
                animation-name: pulse;
                animation-duration: 800ms;
                animation-iteration-count: infinite;
            }
            @keyframes pulse{
                0% {box-shadow: #ffd500}
                100% {box-shadow: 4px 4px 30px {{color}};}
            }
            .smaller{
                z-index: 1;
                width: 150px;
                height: 150px;
                border-radius: 50%;
                background-color: #FFC3C3;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .home{
                background-color: #6B1111;
                color: white;
                padding: 10px 15px;
                border: 0px;
                border-radius: 20px;
                width: 80%;
                font-size: 10pt;
                align-items: flex-end;
                text-align: center;
                font-family: Lemon Milk;
                text-decoration: none;
            }
        </style>
        <link rel="icon" href="/static/icon.png">
        <title>Evaluation</title>
    </head>

            <div class="info" id="ao4">
